name: QIPP 15min Auto‑Sync
on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes (96 runs/day)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Update plant_data.json (test data)
      run: |
        echo '{
          "timestamp": "'$(date -Iseconds)'",
          "generation": '$(echo "scale=1; $RANDOM/1000.0 + 400" | bc -l)',
          "efficiency": '$(echo "scale=2; $RANDOM/10000.0 + 6.0" | bc -l)',
          "fuel": '$(echo "scale=1; $RANDOM/100.0 + 5000" | bc -l)'
        }' > plant_data.json
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "15min sync $(date)"
