name: QIPP 5min Auto‑Sync
on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes (288 runs/day)
  workflow_dispatch:       # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Update plant_data.json
      run: |
        # TODO: Replace with real QIPP data source
        curl -o data.xlsx "YOUR_SHAREPOINT_EXCEL_URL"
        # Or static test data:
        echo '{"date": "'$(date +%Y-%m-%dT%H:%M)'", "generation": '$(echo $RANDOM/1000.0)', "efficiency": '$(echo $(($RANDOM % 10 + 50))/10.0)'}' > plant_data.json
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "5min sync $(date)"
